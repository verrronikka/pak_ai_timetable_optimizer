<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Timetable Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero hero--compact">
        <div class="hero__meta">
          <div class="meta-card meta-card--accent">
            <span class="meta-card__label">Статус</span>
            <span class="meta-card__value" id="hero-status-value"
              >Ожидание генерации</span
            >
          </div>
          <div class="meta-card">
            <span class="meta-card__label">Последнее обновление</span>
            <span class="meta-card__value" id="hero-updated-value"
              >Пока нет данных</span
            >
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel panel--wide">
          <div
            class="error-banner is-hidden"
            id="global-error-banner"
            role="alert"
            aria-live="assertive"
          >
            <div class="error-banner__icon" aria-hidden="true">⚠</div>
            <div class="error-banner__body">
              <strong id="global-error-title">Ошибка генерации</strong>
              <p id="global-error-message">
                Не удалось получить расписание. Попробуйте снова.
              </p>
            </div>
          </div>

          <div class="panel__header">
            <div>
              <h2>Расписание</h2>
            </div>
          </div>

          <div class="table-wrap">
            <table class="schedule-table" aria-label="Таблица расписания">
              <thead>
                <tr>
                  <th>День</th>
                  <th>Пара</th>
                  <th>Аудитория</th>
                  <th>Группа</th>
                  <th>Дисциплина</th>
                  <th>Преподаватель</th>
                </tr>
              </thead>
              <tbody id="schedule-table-body"></tbody>
            </table>
          </div>

        </section>

        <aside class="panel panel--side">
          <div class="panel__header">
            <div>
              <p class="panel__kicker">Статус</p>
              <h2>Панель генерации</h2>
            </div>
          </div>

          <article class="mini-card mini-card--controls">
            <span class="mini-card__label">Действия</span>
            <strong>Управление генерацией</strong>
            <div class="action-controls">
              <label class="control-label" for="result-mode-select"
                >Режим результата</label
              >
              <select id="result-mode-select" class="control-select">
                <option value="ready">Успешный результат</option>
                <option value="empty">Пустой результат</option>
                <option value="error">Ошибка генерации</option>
              </select>

              <div class="control-buttons">
                <button id="generate-btn" class="control-btn control-btn--primary">
                  Сгенерировать
                </button>
                <button id="refresh-btn" class="control-btn">Обновить</button>
                <button id="reset-btn" class="control-btn">Сбросить</button>
              </div>

              <p class="control-hint" id="control-hint">
                Выбери режим и запусти генерацию.
              </p>
            </div>
          </article>
        </aside>
      </main>
    </div>
    <script type="module" src="schedule-actions.js"></script>
    <script type="module" src="schedule-error-banner.js"></script>
    <script type="module" src="schedule-status.js"></script>
    <script type="module" src="schedule-table.js"></script>
    <script type="module" src="schedule-model.js"></script>
  </body>
</html>
